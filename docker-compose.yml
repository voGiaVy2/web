version: "3.8"

# Chỉ dùng để chạy MySQL cục bộ cho việc test/demo.
# Khi deploy thật, dùng MySQL của Railway (xem README.md).
services:
  mysql:
    image: mysql:8.0
    container_name: tomam-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tomam_db
    ports:
      - "3306:3306"
    volumes:
      - tomam_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tomam_mysql_data:
